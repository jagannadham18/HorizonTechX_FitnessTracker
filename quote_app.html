<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator - Horizon TechX</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #74b9ff, #a29bfe); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); text-align: center; max-width: 450px; width: 90%; }
        h2 { color: #2d3436; margin-top: 0; font-size: 24px; }
        p { color: #636e72; font-size: 18px; font-style: italic; min-height: 60px; line-height: 1.5; }
        .author { font-weight: bold; color: #0984e3; margin-top: 10px; font-size: 16px; display: block; }
        button { background-color: #0984e3; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 20px; font-weight: bold; }
        button:hover { background-color: #74b9ff; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <h2>💡 Daily Inspiration</h2>
    <p id="quote">"Believe you can and you're halfway there."</p>
    <span id="author" class="author">- Theodore Roosevelt</span>
    <button onclick="getNewQuote()">New Quote</button>
</div>

<script>
    const quotes = [
        { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
        { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
        { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
        { text: "Strive not to be a success, but rather to be of value.", author: "Albert Einstein" },
        { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" }
    ];

    function getNewQuote() {
        const randomIndex = Math.floor(Math.random() * quotes.length);
        document.getElementById("quote").innerText = `"${quotes[randomIndex].text}"`;
        document.getElementById("author").innerText = `- ${quotes[randomIndex].author}`;
    }
</script>

</body>
</html>
